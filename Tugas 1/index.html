<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💡 Random Quote Generator</h1>
        </div>
        
        <div class="quote-area" id="quoteArea">
            <p class="quote" id="quoteText">
                Klik tombol "Quote Baru" untuk mendapatkan kutipan inspiratif
            </p>
            <p class="author" id="authorText"></p>
        </div>

        <div class="buttons">
            <button id="newQuoteBtn">🎲 Quote Baru</button>
        </div>
    </div>

    <script>
        async function getNewQuote() {
            const newBtn = document.getElementById('newQuoteBtn');
            const quoteText = document.getElementById('quoteText');
            const authorText = document.getElementById('authorText');

            newBtn.textContent = 'Sedang mengambil...';
            newBtn.disabled = true;

            try {
                const response = await fetch('https://dummyjson.com/quotes/random');
                const data = await response.json();

                quoteText.textContent = `"${data.quote}"`;
                authorText.textContent = `— ${data.author}`;

            } catch (error) {
                quoteText.textContent = "Maaf, terjadi kesalahan. Silakan coba lagi.";
                authorText.textContent = "";
            }

            newBtn.textContent = '🎲 Quote Baru';
            newBtn.disabled = false;
        }

        document.getElementById('newQuoteBtn').addEventListener('click', getNewQuote);

        window.onload = () => {
            getNewQuote();
        };
    </script>
</body>

</html>
