<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>💡 Random Quote Generator</h1>
        </div>
        <div class="quote-area" id="quoteArea">
            <p class="quote" id="quoteText">
                Klik tombol "Quote Baru" untuk mendapatkan kutipan inspiratif
            </p>
            <p class="author" id="authorText"></p>
        </div>

        <div class="buttons">
            <button id="newQuoteBtn">🎲 Quote Baru</button>
            <button id="copyBtn">📋 Copy Quote</button>
        </div>
    </div>
    <script>
        let currentQuote = "";

        async function getNewQuote() {
            const quoteArea = document.getElementById('quoteArea');
            const newBtn = document.getElementById('newQuoteBtn');
            const quoteText = document.getElementById('quoteText');
            const authorText = document.getElementById('authorText');

            newBtn.textContent = 'Sedang mengambil...';
            newBtn.classList.add('loading');

            try {
                const response = await fetch('https://dummyjson.com/quotes/random');
                const data = await response.json();

                currentQuote = `"${data.quote}" — ${data.author}`;

                quoteText.textContent = `"${data.quote}"`;
                authorText.textContent = `— ${data.author}`;

            } catch (error) {
                quoteText.textContent = "Maaf, terjadi kesalahan. Silakan coba lagi.";
                authorText.textContent = "";
            }

            newBtn.textContent = '🎲 Quote Baru';
            newBtn.classList.remove('loading');
        }

        async function copyQuote() {
            if (!currentQuote) {
                alert("Belum ada quote untuk dicopy!");
                return;
            }

            try {
                await navigator.clipboard.writeText(currentQuote);

                const originalText = document.getElementById('copyBtn').textContent;
                const copyBtn = document.getElementById('copyBtn');

                copyBtn.textContent = '✅ Berhasil dicopy!';
                copyBtn.style.background = '#198754';

                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.style.background = '#28a745';
                }, 2000);
            } catch (err) {
                alert("Gagal menyalin quote");
            }
        }

        document.getElementById('newQuoteBtn').addEventListener('click', getNewQuote);
        document.getElementById('copyBtn').addEventListener('click', copyQuote);

        window.onload = () => {
            getNewQuote();
        };
    </script>
</body>

</html>
